    <text x="0" y="138" fill="#0d1a3b" font-family="Inter, sans-serif" font-size="56" font-weight="800" letter-spacing="2">HUB</text>
    <text x="0" y="200" fill="#7c4b2e" font-family="Inter, sans-serif" font-size="24" font-weight="600" letter-spacing="1.8">Taste of All Times</text>
  </g>
</svg>
